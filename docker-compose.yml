services:
  gemini-gateway:
    build: .
    container_name: gemini-gateway
    ports:
      - "8317:8317"
      - "8085:8085"
    volumes:
      - ./config.yaml:/app/config.yaml
      - gemini-auths:/data/gemini-gateway/auths
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/New_York
volumes:
  gemini-auths:
